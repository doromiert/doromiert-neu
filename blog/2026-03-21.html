@view-transition {
    navigation: auto;
}

/* spatial logic: index is base (0), business is right (+100%) */
@keyframes slide-to-left {
    to {
        transform: translateX(-100%);
    }
}
@keyframes slide-from-right {
    from {
        transform: translateX(100%);
    }
}
@keyframes slide-to-right {
    to {
        transform: translateX(100%);
    }
}
@keyframes slide-from-left {
    from {
        transform: translateX(-100%);
    }
}

/* moving from main (left) to biz (right) */
::view-transition-old(page-main):only-child {
    animation: 0.5s cubic-bezier(0.7, 0, 0.3, 1) both slide-to-left;
}
::view-transition-new(page-biz):only-child {
    animation: 0.5s cubic-bezier(0.7, 0, 0.3, 1) both slide-from-right;
}

/* moving from biz (right) to main (left) */
::view-transition-old(page-biz):only-child {
    animation: 0.5s cubic-bezier(0.7, 0, 0.3, 1) both slide-to-right;
}
::view-transition-new(page-main):only-child {
    animation: 0.5s cubic-bezier(0.7, 0, 0.3, 1) both slide-from-left;
}

/* avoid cross-fades during the slide */
::view-transition-old(page-main),
::view-transition-new(page-main),
::view-transition-old(page-biz),
::view-transition-new(page-biz) {
    height: 100%;
    mix-blend-mode: normal;
}

/* anchor logo */
#jab-doromiert {
    view-transition-name: main-logo;
}
::view-transition-old(root) {
    animation: 0.5s ease both slide-to-left;
}
::view-transition-new(root) {
    animation: 0.5s ease both slide-from-right;
}
